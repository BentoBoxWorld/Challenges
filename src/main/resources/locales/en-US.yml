        descriptions:
            # This part generates description text for challenges object in all GUI's.
            challenge:
                # The main part that generates description text.
                # [description] comes from challenge.description
                lore: |-
                    [description]
                    [status]
                    [cooldown]
                    [requirements]
                    [rewards]
                # Contains a text generated inside [status] lore
                status:
                    # Status message for completed unrepeatable challenge
                    completed: "<dark_green><bold>Completed"
                    # Status message that contains number of completions for unlimited repeatable challenge
                    completed-times: "<dark_green>Completed <gray><bold>[number] <reset><dark_green>time(s)"
                    # Status message that contains number of completions from max available for repeatable challenge
                    completed-times-of: "<dark_green>Completed <gray><bold>[number] <reset><dark_green>out of <gray><bold>[max] <reset><dark_green>times"
                    # Status message that indicates that max completion count reached for repeatable challenge
                    completed-times-reached: "<dark_green><bold>Completed all <gray>[max] <dark_green>times"
                # Contains a text generated inside [cooldown] lore
                cooldown:
                    lore: |-
                        [timeout]
                        [wait-time]
                    # Text message that shows challenge timeout.
                    timeout: "<gray><bold>Cool down: <reset><gray>[time]"
                    # Text message that shows challenge wait time if it is larger than 0.
                    wait-time: "<red><bold>Available after: <reset><red>[time]"
                    # Text message that replaces days if number > 1
                    in-days: "[number] d "
                    # Text message that replaces hours if number > 1
                    in-hours: "[number] h "
                    # Text message that replaces minutes if number > 1
                    in-minutes: "[number] min "
                    # Text message that replaces seconds if number > 1
                    in-seconds: "[number] s"
                # Contains a text generated inside [requirements] lore
                requirements:
                    lore: |-
                        [environment]
                        [type-requirement]
                        [permissions]
                    # Message that will replace [environment] placeholder if there is just a single environment.
                    environment-single: "<gray>Limited to [environment]"
                    # Message that will replace [environment] placeholder if there are multiple environments.
                    environment-title: "<gray>Limited to: "
                    # Message that will be added after environment-title-multiple.
                    environment-list: "  <gray>- <yellow>[environment]"
                    # Message that will replace [permissions] placeholder if there is just a single permission.
                    permission-single: "<red>Requires [permission] permission."
                    # Message that will replace [permissions] placeholder if there are multiple permissions.
                    permissions-title: "<red>Requires permissions: "
                    # Message that will be added after permissions-title-multiple.
                    permissions-list: "  <red>- [permission]"
                    # Message that will generate for island type requirements and replace [type-requirements]
                    island:
                        lore: |-
                            [blocks]
                            [entities]
                            [search-radius]
                            [warning-block]
                            [warning-entity]
                        # Title that will be used if there are defined blocks in an island challenge
                        blocks-title: "<gray><bold>Required Blocks:"
                        # Listing of blocks that are required on the island.
                        block-value: "  <gray>- <yellow>[material]"
                        blocks-value: "  <gray>- <yellow>[number] x [material]"
                        # Title that will be used if there are defined entities in an island challenge
                        entities-title: "<gray><bold>Required Entities:"
                        # Listing of entities that are required on the island.
                        entity-value: "  <gray>- <yellow>[entity]"
                        entities-value: "  <gray>- <yellow>[number] x [entity]"
                        # Search radius for the blocks/entities
                        search-radius: "<gray>No further than <yellow>[number] <gray>meters"
                        # Warning about block/entity removal
                        warning-block: "<yellow>Blocks will be <red>removed"
                        warning-entity: "<yellow>Entities will be <red>removed"
                    # Message that will generate for inventory type requirements and replace [type-requirements]
                    inventory:
                        lore: |-
                            [items]
                            [warning]
                        # Title that will be used if there is a list of items for the challenge
                        item-title: "<gray><bold>Required Items:"
                        # Listing of an item that is required once or multiple times.
                        item-value: "  <gray>- <yellow>[item]"
                        items-value: "  <gray>- <yellow>[number] x [item]"
                        # Warning that items will be removed
                        warning: "<yellow>Item(s) will be <red>removed"
                    # Message that will generate for other type requirements and replace [type-requirements]
                    other:
                        lore: |-
                            [experience]
                            [experience-warning]
                            [money]
                            [money-warning]
                            [level]
                        # Text for required experience
                        experience: "<gray><bold>Required Experience: <reset><yellow>[number]"
                        # Warning that experience will be reduced
                        experience-warning: "<yellow>Experience will be <red>removed"
                        # Text for required money
                        money: "<gray><bold>Required money: <reset><yellow>[number]"
                        # Warning that money will be reduced
                        money-warning: "<yellow>Money will be <red>removed"
                        # Text for required island level
                        level: "<gray><bold>Required island level: <reset><yellow>[number]"
                    # Message that will generate for statistic type requirements and replace [type-requirement]
                    statistic:
                        lore: |-
                            [statistic]
                            [warning]
                        # Type of statistic for multiple target counter. Target may be entity or material/block
                        multiple-target: "<gray><bold>[statistic]: <reset><yellow>[number] x [target]"
                        # Type of statistic for a single target. Target may be entity or material/block
                        single-target: "<gray><bold>[statistic]: <reset><yellow>[target]"
                        # Type of statistic without an entity/block target
                        statistic: "<gray><bold>[statistic] <reset><yellow>[number]"
                        # Warning that statistic will be reduced
                        warning: "<yellow>Statistic data will be <red>reduced"
                # Contains a text generated inside [rewards] lore
                rewards:
                    lore: |-
                        <gray><bold>Rewards:
                        [text]
                        [items]
                        [experience]
                        [money]
                        [commands]
                    # Title that will be used if there is a list of items for rewards
                    item-title: "<gray>Items:"
                    # Listing of an item that is rewarded multiple times.
                    item-value: "  <gray>- <yellow>[item]"
                    items-value: "  <gray>- <yellow>[number] x [item]"
                    # Text for reward experience
                    experience: "<gray>Experience: <reset><yellow>[number]"
                    # Text for reward money
                    money: "<gray>Money: <reset><yellow>[number]"
                    # Title for commands listing:
                    commands-title: "<gray>Commands:"
                    # Command listing element
                    command: "  <gray>- <yellow>[command]"
            # This part generates description text for levels object in all GUI's.
            level:
                lore: |-
                    [text]
                    [status]
                    [waiver]
                    [rewards]
                # Status is either challengeLevel.unlockMessage or the current status of the level
                status:
                    # Status message for a completed unrepeatable challenge
                    completed: "<dark_green><bold>Completed"
                    # Status message that contains the number of completed challenges out of all challenges
                    completed-challenges-of: |-
                        <dark_green>Completed <gray><bold>[number] <reset><dark_green>out of <gray><bold>[max] <reset><dark_green>challenges.
                    # Status message for a locked level
                    locked: "<red><bold>Locked"
                    # Status message for a locked level that will show the missing challenge count.
                    missing-challenges: |-
                        <gray>[number] more challenges need to be
                        <gray>completed to unlock this level.
                # Contains text for the waiver amount to unlock the next level
                waiver: |-
                    <gray><bold>[number] challenge(s) can be
                    <gray>skipped to unlock the next level.
                # Contains text generated inside [rewards] lore
                rewards:
                    lore: |-
                        <gray><bold>Rewards:
                        [text]
                        [items]
                        [experience]
                        [money]
                        [commands]
                    item-title: "<gray>Items:"
                    item-value: "  <gray>- <yellow>[item]"
                    items-value: "  <gray>- <yellow>[number] x [item]"
                    experience: "<gray>Experience: <reset><yellow>[number]"
                    money: "<gray>Money: <reset><yellow>[number]"
                    commands-title: "<gray>Commands:"
                    command: "  <gray>- <yellow>[command]"
            # This part generates description for the Library Entry
            library:
                author: "<gray>by <yellow>[author]"
                version: "<gray>Made with Challenges <yellow>[version]"
                lang: "<gray>Language: <yellow>[lang]"
                gamemode: "<gray>Primary for <yellow>[gamemode]"
