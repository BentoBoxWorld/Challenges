---
meta:
  authors:
  - BONNe
challenges:
  commands:
    admin:
      main:
        description: Commande principale Admin. Ouverture du menu.
      reload:
        description: Recharger les défis de la base de données
      show:
        description: Afficher dans le chat tous les défis qui existent dans ce monde.
