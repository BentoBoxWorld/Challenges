        parameters: "<joueur> <id_du_challenge>"
      migrate:
        description: Migrez les données des challenges du monde du jeu actuel au format
          de stockage 0.8.0.
    user:
      main:
        description: Cette méthode ouvre le menu des Challenges.
      complete:
        description: Cette méthode permet de compléter un challenger sans menu.
        parameters: "<challenge_id> [count]"
  gui:
    titles:
      player-gui: "<black><bold>Menu Challenges"
      gamemode-gui: "<black><bold>Sélectionner le mode de jeu"
      multiple-gui: "<black><bold>Combien de fois ?"
      admin-gui: "<black><bold>Menu d'administration des Challenges"
      edit-challenge: "<black><bold>Editer [challenge]"
      edit-level: "<black><bold>Editer [level]"
      settings: "<black><bold>Paramètres"
