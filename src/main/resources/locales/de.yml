---
meta:
  authors:
  - BONNe
challenges:
  commands:
    admin:
      main:
        description: Hauptadministrationsbefehl. Öffnet GUI.
      reload:
        description: |-
          Herausforderungen aus der Datenbank neu laden
          Parameter hard bedeutet, dass Addon die Verbindung zur Datenbank zurücksetzen wird.
      show:
        description: Schreibt alle Herausforderungen in den Chat, die es auf dieser
          Welt gibt.
      complete:
        description: Eine Herausforderung für einen Spieler abschließen.
        parameters: "<player> <challenge_id>"
      reset:
        description: Eine Herausforderung für einen Spieler zurücksetzen. Wenn "challenge_id"
          auf "all" gesetzt ist, werden alle Herausforderungen zurückgesetzt.
        parameters: "<player> <challenge_id>"
      migrate:
        description: Migrieren der aktuellen Spielwelt Herausforderungen Daten auf
          0.8.0 Speicherformat.
    user:
      main:
        description: Herausforderungen GUI öffnen.
      complete:
        description: Herausforderung abschließen.
        parameters: "<challenge_id> [count]"
  gui:
    titles:
      player-gui: "<black><bold>Herausforderungsmenü"
      gamemode-gui: "<black><bold>Spielmodus auswählen"
      multiple-gui: "<black><bold>Wie oft?"
      admin-gui: "<black><bold>Herausforderung Admin Menu"
      edit-challenge: "<black><bold>Herausforderung [challenge]"
      edit-level: "<black><bold>Level Bearbeiten [level]"
      settings: "<black><bold>Einstellungen"
      choose-challenge: "<black><bold>Herausforderung wählen"
      choose-level: "<black><bold>Level wählen"
      choose-player: "<black><bold>Spieler wählen"
      library: "<black><bold>Bibliothek"
      manage-blocks: "<black><bold>Blöcke verwalten"
      manage-entities: "<black><bold>Einheiten verwalten"
      type-selector: "<black><bold>Wahl des Herausforderungstyps"
      item-selector: "<black><bold>Item Auswahl"
      block-selector: "<black><bold>Block wählen"
      entity-selector: "<black><bold>Mob wählen"
      challenge-selector: "<black><bold>Herausforderungsauswahl"
      statistic-selector: "<black><bold>Statistik Auswahl"
      environment-selector: "<black><bold>Umgebungs Auswahl"
    buttons:
      free-challenges:
        name: "<white><bold>Kostenlose Herausforderungen"
        description: |-
          <gray>Zeigt eine Liste von
          <gray>kostenlose Herausforderungen
      return:
        name: "<white><bold>Zurück"
        description: |-
          <gray>Zurück zum vorherigen Menü
          <gray>oder beenden Sie die GUI
      previous:
        name: "<white><bold>Vorherige Seite"
        description: "<gray>Zur Seite <yellow>[number] <gray>wechseln"
      next:
        name: "<white><bold>Nächste Seite"
        description: "<gray>Zur Seite <yellow>[number] <gray>wechseln"
      reduce:
        name: "<white><bold>Verringern"
        description: "<gray>verringern um <yellow>[Zahl]"
      increase:
        name: "<white><bold>Erhöhen"
        description: "<gray>Erhöhen um <yellow>[number]"
      accept:
        name: "<white><bold>Abgeschlossen"
        description: |-
          <gray>Erledige Herausforderung <yellow>[number]
          <gray>time(-s)
      quit:
        name: "<white><bold>Beenden"
        description: "<gray>Verlasse die GUI."
      complete_user_challenges:
        name: "<white><bold>Schließe die  Benutzerherausforderung(en) ab"
        description: |-
          <gray>Ermöglicht die Auswahl von einem Spieler und
          <gray>das Abschließen von Herausforderung(en) für
          <gray>ihn
      reset_user_challenges:
        name: "<white><bold>Benutzerherausforderungen zurücksetzen"
        description: |-
          <gray>Ermöglicht die Auswahl von einem Spieler und
          <gray>setzt seine Herausforderungen zurück
      add_challenge:
        name: "<white><bold>Herausforderung erstellen"
        description: |-
          <gray>Startet einen Prozess um
          <gray>einer neue Herausforderung ertellen.
      add_level:
        name: "<white><bold>Level erstellen"
        description: |-
          <gray>Startet einen Prozess für
          <gray>Erstellen eines neuen Level.
      edit_challenge:
        name: "<white><bold>Herausforderung bearbeiten"
        description: |-
          <gray>Ermöglicht die Auswahl und Bearbeitung
          <gray>eine Herausforderung.
      edit_level:
        name: "<white><bold>Level bearbeiten"
        description: |-
          <gray>Ermöglicht die Auswahl und Bearbeitung
          <gray>eines Level's.
      delete_challenge:
        name: "<white><bold>Herausforderung löschen"
        description: |-
          <gray>Ermöglicht das Auswählen und Löschen
          <gray>eine Herausforderung.
      delete_level:
        name: "<white><bold>Level löschen"
        description: |-
          <gray>Ermöglicht das Auswählen und Löschen
          <gray>eines Level.
      edit_settings:
        name: "<white><bold>Einstellungen"
        description: |-
          <gray>Ermöglicht das Anzeigen und Bearbeiten der
          <gray>Add-on-Einstellungen.
      complete_wipe:
        name: "<white><bold>Löschen abschließen"
        description: |-
          <gray>Löscht Herausforderungen vollständig
          <gray>Zusatzdatenbank, einschließlich
          <gray>Benutzerdaten.
      challenge_wipe:
        name: "<white><bold>Herausforderung Löschen"
        description: |-
          <gray>Löscht Herausforderungen vollständig
          <gray>und Level aus der Datenbank.
      user_wipe:
        name: "<white><bold>Benutzerlöschung"
        description: |-
          <gray>Benutzer vollständig aus der
          <gray>Datenbank löschen.
      library:
        name: "<white><bold>Bibliothek"
        description: |-
          <gray>Öffnet eine öffentliche
          Bibliothek für <gray>-Herausforderungen.
      import_database:
        name: "<white><bold>Datenbank importieren"
        description: |-
          <gray>Ermöglicht den Import von Exportierten
          <gray>Herausforderungen.
      import_template:
        name: "<white><bold>Vorlage importieren"
        description: |-
          <gray>Ermöglicht das Importieren einer Vorlagen Datei
          <gray>mit Herausforderungen.
      export_challenges:
        name: "<white><bold>Export der Herausforderungen"
        description: |-
          <gray>Ermöglicht den Export der Datenbank
          <gray>in eine lokale Datei.
      properties:
        name: "<white><bold>Eigenschaften"
        description: "<gray>Alle Haupteigenschaften anzeigen."
      requirements:
        name: "<white><bold>Voraussetzungen"
        description: "<gray>Anforderungseigenschaften anzeigen."
      rewards:
        name: "<white><bold>Belohnungen"
        description: "<gray>Belohnung Eigenschaften anzeigen."
      deployed:
        name: "<white><bold>Bereitstellung"
        description: "<gray>Umschalten, wenn Herausforderung \n<gray>bereitgestellt ist
          und Benutzer sie abschließen\n<gray>können."
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      name:
        name: "<white><bold>Name"
        description: |-
          <gray>Änderung erlaubt
          <gray>der Anzeigename.
        value: "<gray>Aktuell: <reset>[name]"
      remove_on_complete:
        name: "<white><bold>Nach Abschluss ausblenden"
        description: |-
          <gray>Umschalten ob Herausforderungen
          <gray>verborgen werden wenn diese
          <gray>vom Spieler abgeschlossen wurden.
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      description:
        name: "<white><bold>Beschreibung"
        description: |-
          <gray>Die spezifische Beschreibung
          <gray>für die Herausforderung. Die FarbCodes
          <gray>müssen darauf angewendet werden.
        value: "<gray>Aktuelle Beschreibung:"
      environment:
        name: "<white><bold>Dimension"
        description: |-
          <gray>Erlaubt die Limitierung
          <gray>in welcher Welt Sie die Herausforderung
          <gray>abgeschlossen werden kann.
        enabled: "<dark_green>"
        disabled: "<red>"
      order:
        name: "<white><bold>Reihenfolge"
        description: |-
          <gray>Ermöglicht das Ändern der Reihenfolge von
          <gray>Items.
          <gray>Items mit gleichen Nummern
          <gray>werden sortiert nach
          <gray>eindeutigem ID-Namen.
        value: "<gray>Aktueller Auftrag: <yellow>[number]"
      icon:
        name: "<white><bold>Icon"
        description: |-
          <gray>Ermöglicht das Ändern des Symbols
          <gray>für diese Herausforderung.
      locked_icon:
        name: "<white><bold>Sperrsymbol"
        description: |-
          <gray>Erlaubt Änderung gesperrt
          <gray>des Level-Symbol.
      required_permissions:
        name: "<white><bold>Erforderliche Berechtigungen"
        description: "<gray>Änderungserlaubnis erforderlich,\n<gray>Berechtigungen welche
          benötigt werden damit die \n<gray>Herausforderung  abgeschlossen werden kann."
        title: "<gray>Berechtigungen:"
        permission: " <dark_gray>- [permission]"
        none: "<gray>Berechtigungen sind nicht gesetzt."
      remove_entities:
        name: "<white><bold>Mobs entfernen"
        description: |-
          <gray>Erlaubt Umschalten ob
          <gray>erforderliche Mobs
          <gray>aus der Welt entfernt werden
          <gray>nach Abschluss der
          <gray>Herausforderung.
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      required_entities:
        name: "<white><bold>Erforderliche Mobs"
        description: |-
          <gray>Ermöglicht die Änderung der erforderlichen
          <gray>Mobs, damit diese
          <gray>Herausforderung abgeschlossen werden kann.
        title: "<gray>Mobs: "
        list: " <dark_gray>- [number] x [entity]"
        none: "<gray>Mobs werden nicht hinzugefügt."
      remove_blocks:
        name: "<white><bold>Blöcke entfernen"
        description: "<gray>Ermöglicht das Umschalten, ob\n<gray>erforderliche Blöcke\n<gray>
          aus der Welt entfernt werden\n<gray>nach Beendigung \n<gray>der Herausforderung"
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      required_blocks:
        name: "<white><bold>Erforderliche Blöcke"
        description: |-
          <gray>Ermöglicht die Änderung der erforderlichen
          <gray>Blöcke um die
          <gray>Aufgabe abschließen zu können.
        title: "<gray>Blöcke:"
        list: " <dark_gray>- [number] x [block]"
        none: "<gray>Blöcke werden nicht hinzugefügt."
      search_radius:
        name: "<white><bold>Suchradius"
        description: |-
          <gray>Ermöglicht die Änderung des Radius
          <gray>um den Spieler, von dem aus
          <gray>Blöcke und/oder Objekte
          <gray>erkannt werden.
        value: "<gray>Aktueller Abstand: <yellow>[number]"
      remove_items:
        name: "<white><bold>Items entfernen"
        description: |-
          <gray>Ermöglicht das Umschalten, ob
          <gray>benötigte Gegenstände
          <gray>aus dem Inventar entfernt werden
          <gray>nach Beendigung der
          <gray>Herausforderung.
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      required_items:
        name: "<white><bold>Erforderliche Gegenstände"
        description: |-
          <gray>Ermöglicht die Änderung der erforderlichen
          <gray>Elemente für diese
          <gray>Herausforderung abgeschlossen werden kann.
        title: "<gray>Items: "
        list: " <dark_gray>- [number] x [item]"
        none: "<gray>Items werden nicht hinzugefügt."
      add_ignored_meta:
        name: "<white><bold>Metadaten ignorieren hinzufügen"
        description: |-
          <gray>Ermöglicht das Hinzufügen, welche
          <gray>Items ignoriert werden sollen, inkl.
          <gray>aller Metadaten, die
          <gray>ihnen zugewiesen sind.
        title: "<gray>Items: "
        list: " <dark_gray>- [number] x [item]"
        none: "<gray>Items werden nicht hinzugefügt."
      remove_ignored_meta:
        name: "<white><bold>Entfernen Metadaten ignorieren"
        description: |-
          <gray>Ermöglicht das Entfernen der
          <gray>Items, die ignoriert werden sollen und
          <gray>allen Metadaten, die
          <gray>ihnen zugewiesen sind.
      remove_experience:
        name: "<white><bold>Erfahrung entfernen"
        description: |-
          <gray>Ermöglicht das Umschalten, ob
          <gray>erforderliche Erfahrung
          <gray>vom Spieler entfernt wird
          <gray>nach Beendigung der
          <gray>Herausforderung.
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      required_experience:
        name: "<white><bold>Erforderliche Erfahrung"
        description: |-
          <gray>Ermöglicht die Änderung der
          <gray>erforderliche Erfahrung für
          <gray>den Spieler.
        value: "<gray>Aktuelle Erfahrung: <yellow>[number]"
      required_level:
        name: "<white><bold>Erforderliche Inselstufe"
        description: |-
          <gray>Ermöglicht die Änderung der
          <gray>erforderliche Inselstufe
          <gray>für die Herausforderung.
        value: "<gray>Aktuelle Ebene: <yellow>[number]"
      remove_money:
        name: "<white><bold>Geld entfernen"
        description: |-
          <gray>Ermöglicht das Umschalten, ob
          <gray>das benötigte Geld
          <gray>vom Spieler entfernt wird,das
          <gray>Konto entfernt wird, nachdem er die
          <gray>die Herausforderung.
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      required_money:
        name: "<white><bold>Benötigtes Geld"
        description: |-
          <gray>Ermöglicht die Änderung der
          <gray>erforderliche Geld auf dem Spieler
          <gray>Konto für die Herausforderung.
        value: "<gray>Aktueller Wert: <yellow>[number]"
      statistic:
        name: "<white><bold>Statistik"
        description: |-
          <gray>Ermöglicht die Änderung des
          <gray>Statistiktyp, der
          <gray>in dieser Challenge geprüft wird.
        value: "<gray>Aktueller Wert: <yellow>[statistic]"
      statistic_amount:
        name: "<white><bold>Zielwert"
        description: |-
          <gray>Ermöglicht die Änderung des
          <gray>statistischen Zielwert
          <gray>, der erfüllt werden muss.
        value: "<gray>Aktueller Wert: <yellow>[number]"
      remove_statistic:
        name: "<white><bold>Statistik verkleinern"
        description: |-
          <gray>Ermöglicht das Umschalten, ob
          <gray>der statistische Wert
          <gray>nach Beendigung der Herausforderung
          <gray>die Herausforderung.
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      statistic_blocks:
        name: "<white><bold>Zielblock"
        description: |-
          <gray>Ermöglicht die Änderung des
          <gray>statistischen Zielblocks.
        value: "<gray>Aktueller Block: <yellow>[block]"
      statistic_items:
        name: "<white><bold>Ziel Item"
        description: |-
          <gray>Ermöglicht die Änderung des
          <gray>statistische Zielposition.
        value: "<gray>Aktuelles Element: <yellow>[item]"
      statistic_entities:
        name: "<white><bold>Ziel Mob"
        description: |-
          <gray>Ermöglicht die Änderung des
          <gray>statistischen Zielobjekts.
        value: "<gray>Aktuelle Mob: <yellow>[entity]"
      reward_text:
        name: "<white><bold>Belohnungstext"
        description: |-
          <gray>Der spezifische Belohnungstext.
          <gray>Die Farbcodes müssen
          <gray>darauf angewendet werden.
        value: "<gray>Aktueller Text:"
      repeat_reward_text:
        name: "<white><bold>Belohnungstext wiederholen"
        description: |-
          <gray>Der spezifische Wiederholungsbelohnungstext
          <gray>für die Herausforderung. Die Farb
          <gray>Codes müssen darauf angewendet werden.
        value: "<gray>Aktueller Text:"
      reward_items:
        name: "<white><bold>Belohnungsgegenstände"
        description: |-
          <gray>Ermöglicht das Ändern von Belohnungen
          <gray>Gegenstände.
        title: "<gray>Items: "
        list: " <dark_gray>- [number] x [item]"
        none: "<gray>Items werden nicht hinzugefügt."
      repeat_reward_items:
        name: "<white><bold>Belohnungs Item wiederholen"
        description: |-
          <gray>Ermöglicht die Änderung der Wiederholung
          <gray>Belohnungsgegenstände für diese
          <gray>-Herausforderung.
        title: "<gray>Items: "
        list: " <dark_gray>- [number] x [item]"
        none: "<gray>Items werden nicht hinzugefügt."
      reward_experience:
        name: "<white><bold>Belohnungserfahrung"
        description: |-
          <gray>Ermöglicht die Änderung des
          <gray>Belohnungserlebnis für
          <gray>den Spieler.
        value: "<gray>Belohnungserfahrung: <yellow>[number]"
      repeat_reward_experience:
        name: "<white><bold>Belohnungserfahrung wiederholen"
        description: |-
          <gray>Ermöglicht die Änderung des
          <gray>Wiederholung der Belohnungserfahrung
          <gray>für den Spieler.
        value: "<gray>Belohnungserlebnis: <yellow>[number]"
      reward_money:
        name: "<white><bold>Belohnungsgeld"
        description: |-
          <gray>Ermöglicht die Änderung des
          <gray>Belohnungsgeld.
        value: "<gray>Aktueller Wert: <yellow>[number]"
      repeat_reward_money:
        name: "<white><bold>Belohnungsgeld wiederholen"
        description: |-
          <gray>Ermöglicht die Änderung des
          <gray>Wiederholung des Belohnungsgeldes
          <gray>für die Herausforderung.
        value: "<gray>Aktueller Wert: <yellow>[number]"
      reward_commands:
        name: "<white><bold>Belohnungsbefehle"
        description: |-
          <gray>Die spezifischen Belohnungsbefehle.
          <dark_gray>Tipp:
          <dark_gray>Der Befehl muss
          <dark_gray>zuerst mit `/` geschrieben werden, da er
          <dark_gray>automatisch angewendet wird.
          <dark_gray>Standardmäßig werden die Befehle
          <dark_gray>vom Server ausgeführt. Jedoch
          <dark_gray>das Hinzufügen von `[SELF]` am Anfang
          <dark_gray>ermöglicht es, dass der Befehl
          <dark_gray>vom Spieler ausgeführt werden. Außerdem
          <dark_gray>unterstützt einen Platzhalter
          <dark_gray>`[player]`, der dann
          <dark_gray>durch einen Spielernamen ersetzt wird
          <dark_gray>der die Herausforderung abgeschlossen hat.
        value: "<gray>Aktuelle Befehle:"
      repeat_reward_commands:
        name: "<white><bold>Belohnungsbefehle wiederholen"
        description: |-
          <gray>Die spezifische Wiederholungsbelohnung
          <gray>Befehle für die Herausforderung.
          <dark_gray>Tipp:
          <dark_gray>Der Befehl muss
          <dark_gray>zuerst mit `/` geschrieben werden, da er
          <dark_gray>automatisch angewendet wird.
          <dark_gray>Standardmäßig werden die Befehle
          <dark_gray>vom Server ausgeführt. Jedoch
          <dark_gray>das Hinzufügen von `[SELF]` am Anfang
          <dark_gray>ermöglicht es, dass der Befehl
          <dark_gray>vom Spieler ausgeführt werden. Außerdem
          <dark_gray>unterstützt einen Platzhalter
          <dark_gray>`[player]`, der dann
          <dark_gray>durch einen Spielernamen ersetzt wird
          <dark_gray>der die Herausforderung abgeschlossen hat.
        value: "<gray>Aktuelle Befehle:"
      repeatable:
        name: "<white><bold>Wiederholbar"
        description: |-
          <gray>Ermöglicht das Umschalten, ob
          <gray>die Herausforderung
          <gray>wiederholbar ist.
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      repeat_count:
        name: "<white><bold>Wiederholungszähler"
        description: |-
          <gray>Ermöglicht die Änderung der
          <gray>Anzahl der Wiederholungen
          <gray>für die Herausforderung.
        value: "<gray>Aktueller Wert: <yellow>[number]"
      cool_down:
        name: "<white><bold>Abkühlen"
        description: |-
          <gray>Ermöglicht die Änderung der
          <gray>Abkühlsekunden, die
          <gray>gewartet werden muss zwischen
          <gray>wiederholbaren Herausforderungen
          <gray>und deren Beendigung gewartet werden muss.
        value: "<gray>Aktueller Wert: <yellow>[time]"
      challenges:
        name: "<white><bold>Herausforderungen"
        description: |-
          <gray>Zugewiesene Herausforderungen anzeigen
          <gray>zum Level.
      waiver_amount:
        name: "<white><bold>Verzichtsbetrag"
        description: |-
          <gray>Ermöglicht die Festlegung einer Anzahl
          <gray>von Herausforderungen, die
          <gray>unvollendet gelassen werden können, um
          <gray>das nächste Level freizuschalten.
        value: "<gray>Aktueller Wert: <yellow>[number]"
      add_challenges:
        name: "<white><bold>Herausforderung(en) hinzufügen"
        description: |-
          <gray>Ermöglicht die Auswahl und
          <gray>fügt Herausforderungen zum
          <gray>leveln.
      remove_challenges:
        name: "<white><bold>Herausforderung(en) entfernen"
        description: |-
          <gray>Ermöglicht die Auswahl und
          <gray>Entfernen von Herausforderungen auf dem
          <gray>Level.
      reset_on_new:
        name: "<white><bold>Zurücksetzen auf Neu"
        description: |-
          <gray>Ermöglicht das Umschalten, ob
          <gray>Herausforderungen
          <gray>zurückgesetzt werden sollen, wenn der Benutzer die
          <gray>Insel verlässt oder eine neue
          <gray>Insel erstellt.
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      broadcast:
        name: "<white><bold>Broadcast"
        description: |-
          <gray>Sendungen Herausforderung und
          <gray>Erstmaliger Abschluss eines Levels
          <gray>an alle.
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      remove_completed:
        name: "<white><bold>Ausblenden abgeschlossen"
        description: |-
          <gray>Versteckt abgeschlossene Herausforderungen
          <gray>aus dem Menü.
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      glow_completed:
        name: "<white><bold>Glühen wenn abgeschlossen"
        description: |-
          <gray>Fügt Verzauberungsglühen
          <gray>zu den abgeschlossenen Herausforderungen.
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      store_history:
        name: "<white><bold>Store-Verlauf"
        description: |-
          <gray>Speichert den internen Verlauf
          <gray>wenn jede Herausforderung
          <gray>abgeschlossen ist.
          <gray>Derzeit nur einsehbar
          <gray>in der Datenbank.
        enabled: "<dark_green>Aktiviert"
        disabled: "<red>Deaktiviert"
      data_per_island:
        name: "<white><bold>Speichern pro Insel"
        description: |-
          <gray>Speichert die abgeschlossenen
          <gray>Herausforderungen pro Insel.
          <gray>Der Fortschritt wird mit allen
          <gray>mit allen Spielern im Team geteilt.
