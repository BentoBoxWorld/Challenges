      next:
        name: "<white><bold>Nākošā Lapa"
        description: |-
          <gray>Pārslēgties uz <yellow>[number] <gray>lapu
      # Button that allows to reduce number
      reduce:
        name: "<white><bold>Samazināt"
        description: |-
          <gray>Samazināt par <yellow>[number]
